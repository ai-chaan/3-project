<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Facilitator - フル機能版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .setup-box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        .main-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .video-box { position: relative; }
        video { display: none; }
        canvas { border: 4px solid #333; border-radius: 10px; transform: scaleX(-1); max-width: 100%; height: auto; }
        .dashboard { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; text-align: left; }
        .alert-text { font-size: 16px; color: #e74c3c; font-weight: bold; min-height: 25px; margin-top: 10px; }
        .global-alert { font-size: 16px; color: #d35400; font-weight: bold; background: #fdebd0; padding: 10px; border-radius: 5px; margin-top: 10px; min-height: 20px;}
        .status-item { margin-bottom: 10px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .network-box { margin-top: 20px; padding: 10px; background: #eef5ff; border-radius: 8px; font-size: 14px; }
        input { padding: 8px; margin: 0 5px; border: 1px solid #ccc; border-radius: 4px;}
        button { padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;}
        button:hover { background: #2980b9; }
        ul { text-align: left; margin: 10px 0 0 0; padding-left: 20px;}
    </style>
</head>
<body>

    <h1>🤖 チームファシリテーター</h1>

    <div class="setup-box" id="setup-area">
        自分の名前: <input type="text" id="my-name" value="Aさん">
        <button onclick="startSystem()">カメラ・マイクを起動して設定へ</button>
    </div>

    <div class="main-container" id="main-area" style="display: none;">
        <div class="video-box">
            <video id="video" width="640" height="480" autoplay playsinline></video>
            <canvas id="output_canvas" width="640" height="480"></canvas>
            
            <div class="setup-box" style="margin-top: 15px; width: 90%; display: block;">
                <h3>📍 参加者の位置を学習させる</h3>
                <p style="font-size: 14px; color: #555;">画面上の相手がいる方向を向いて「今の向きを登録」を押してください。</p>
                <input type="text" id="target-name" placeholder="例: Bさん">
                <button onclick="registerTarget()" style="background: #2ecc71;">今の向きを登録</button>
                <ul id="registered-list">
                    <li>正面 (デフォルト)</li>
                </ul>
            </div>
        </div>

        <div class="dashboard">
            <h3>📊 あなたの状況</h3>
            <div class="status-item" id="my-direction">視線: 判定中...</div>
            <div class="status-item" id="my-audio">発言量: 判定中...</div>
            
            <div class="alert-text" id="look-alert"></div>
            
            <h3>🌐 全体のアラート</h3>
            <div class="global-alert" id="global-audio-alert"></div>
            <div class="global-alert" id="network-alert"></div>

            <h3>📡 全体のネットワーク</h3>
            <div class="network-box" id="network-view">サーバー接続待機中...</div>
        </div>
    </div>

    <script>
        // --- 設定変数 ---
        let myName = "";
        let ws;
        
        // 音声関連
        let isSpeaking = false;
        let speakingTime = 0; 
        let isOverSpeaking = false; // 自分自身の話しすぎフラグ
        const SPEAKING_LIMIT = 150; // 話しすぎ警告の閾値 (約5秒連続)
        
        // 顔の向き関連
        let currentLookTarget = "正面";
        let currentFaceRatio = 0.5; // 現在の顔の角度比率
        let lookDuration = 0;
        const LOOK_LIMIT = 80; // 見すぎ警告の閾値
        
        // 登録された座席配置 (初期値は正面のみ)
        let registeredTargets = [
            { name: "正面", ratio: 0.5 }
        ];

        // UI要素
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const lookAlertEl = document.getElementById('look-alert');
        const globalAudioAlertEl = document.getElementById('global-audio-alert');
        const networkAlertEl = document.getElementById('network-alert');
        const myDirectionEl = document.getElementById('my-direction');
        const myAudioEl = document.getElementById('my-audio');
        const networkViewEl = document.getElementById('network-view');
        const registeredListEl = document.getElementById('registered-list');

        // システム起動
        async function startSystem() {
            myName = document.getElementById('my-name').value;
            if(!myName) return alert("名前を入力してください");
            
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('main-area').style.display = 'flex';

            initWebSocket();
            await initAudio();
            initFaceMesh();
        }

        // --- 座席位置の登録（キャリブレーション） ---
        function registerTarget() {
            const tName = document.getElementById('target-name').value;
            if(!tName) return alert("登録する人の名前を入力してください");

            // 現在の顔の角度比率を保存
            registeredTargets.push({ name: tName, ratio: currentFaceRatio });
            
            // UIを更新
            const li = document.createElement('li');
            li.innerText = `${tName} (角度: ${currentFaceRatio.toFixed(2)})`;
            registeredListEl.appendChild(li);
            
            document.getElementById('target-name').value = ""; // リセット
        }

        // --- WebSocket (ネットワーク機能) ---
        function initWebSocket() {
            ws = new WebSocket('ws://localhost:8080');
            
            ws.onopen = () => { console.log("サーバー接続成功"); };
            
            ws.onmessage = (event) => {
                const networkData = JSON.parse(event.data);
                updateNetworkView(networkData);
                checkGlobalStatus(networkData);
            };

            // 毎秒自分の状態をサーバーに送信 (overSpeakingも送信)
            setInterval(() => {
                if(ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        name: myName,
                        lookingAt: currentLookTarget,
                        speaking: isSpeaking,
                        overSpeaking: isOverSpeaking 
                    }));
                }
            }, 500);
        }

        // --- ネットワーク状態の描画と全体アラート ---
        function updateNetworkView(data) {
            let html = "";
            data.forEach(user => {
                const talkIcon = user.speaking ? "🗣️(発言中)" : "静聴";
                const overWarn = user.overSpeaking ? "⚠️" : "";
                html += `<div><b>${user.name}</b> ${overWarn} → ${user.lookingAt} [${talkIcon}]</div>`;
            });
            networkViewEl.innerHTML = html;
        }

        function checkGlobalStatus(data) {
            // 1. 全体への話しすぎアラート検知
            let overSpeaker = data.find(u => u.overSpeaking);
            if (overSpeaker) {
                if (overSpeaker.name === myName) {
                    globalAudioAlertEl.innerText = "📢 あなたが少し話しすぎかもしれません。周りの意見も聞いてみましょう。";
                } else {
                    globalAudioAlertEl.innerText = `📢 ${overSpeaker.name}さんの発言が続いています。相槌や質問を挟んでみましょう！`;
                }
            } else {
                globalAudioAlertEl.innerText = "";
            }

            // 2. 孤立検知 (誰も自分を見ておらず、自分が発言もしていない)
            let someoneLookingAtMe = false;
            data.forEach(user => {
                if (user.name !== myName && user.lookingAt === myName) someoneLookingAtMe = true;
            });

            if (!someoneLookingAtMe && !isSpeaking && data.length >= 3) {
                networkAlertEl.innerText = "💡 会話に入りづらいですか？「ちなみに…」と手を挙げてみましょう。";
            } else {
                networkAlertEl.innerText = "";
            }
        }

        // --- マイク解析 (話しすぎ判定) ---
        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                
                analyser.fftSize = 256;
                microphone.connect(analyser);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);

                function checkVolume() {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    let average = sum / dataArray.length;

                    if (average > 15) {
                        isSpeaking = true;
                        speakingTime++;
                        myAudioEl.innerText = "発言量: 🗣️ 話しています";
                    } else {
                        isSpeaking = false;
                        speakingTime = 0;
                        isOverSpeaking = false;
                        myAudioEl.innerText = "発言量: 黙っています";
                    }

                    // 話しすぎフラグのセット（これによってサーバー経由で全体に共有される）
                    if (speakingTime > SPEAKING_LIMIT) {
                        isOverSpeaking = true;
                    }

                    requestAnimationFrame(checkVolume);
                }
                checkVolume();
            } catch (err) {
                console.error("マイクのアクセスが拒否されました", err);
                myAudioEl.innerText = "マイクエラー";
            }
        }

        // --- 顔の向き解析 (登録済みの角度との照合) ---
        function initFaceMesh() {
            const videoElement = document.getElementById('video');
            const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
            
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            
            faceMesh.onResults((results) => {
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                if (results.image) canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const landmarks = results.multiFaceLandmarks[0];
                    const nose = landmarks[1], leftEdge = landmarks[234], rightEdge = landmarks[454];

                    // 顔の左右のゆがみ（角度）を0〜1の比率で計算
                    const distToLeft = nose.x - leftEdge.x;
                    const distToRight = rightEdge.x - nose.x;
                    currentFaceRatio = distToLeft / (distToLeft + distToRight);
                    
                    // 登録されたターゲットの中で、現在の角度に一番近い人を探す
                    let closestTarget = "正面";
                    let minDiff = 1.0;
                    
                    registeredTargets.forEach(target => {
                        let diff = Math.abs(currentFaceRatio - target.ratio);
                        // 誤差0.15以内なら「見ている」と判定
                        if (diff < minDiff && diff < 0.15) {
                            minDiff = diff;
                            closestTarget = target.name;
                        }
                    });

                    myDirectionEl.innerText = `視線: ${closestTarget} を見ています`;

                    // 見すぎアラート（自分のみ）
                    if (closestTarget === currentLookTarget && closestTarget !== "正面") {
                        lookDuration++;
                        if (lookDuration > LOOK_LIMIT) {
                            lookAlertEl.innerText = `⚠️ ${closestTarget}を見すぎです！別の人にも顔を向けましょう。`;
                        }
                    } else {
                        currentLookTarget = closestTarget;
                        lookDuration = 0;
                        lookAlertEl.innerText = "";
                    }
                }
            });

            const camera = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({image: videoElement}); },
                width: 640, height: 480
            });
            camera.start();
        }
    </script>
</body>
</html>
